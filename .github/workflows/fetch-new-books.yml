name: Fetch New Books from Alma

on:
  workflow_dispatch:
  schedule:
    - cron: '45 8 * * 1'
      timezone: "America/New_York"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grant write permission to the GITHUB_TOKEN

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Fetch all history for git operations

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install xmltodict

    - name: Run Python script to generate files
      env:
        API_KEY: ${{ secrets.API_KEY }}
        GB_API_KEY: ${{ secrets.GB_API_KEY }}
      run: |
        python alma-new-books.py

    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Automated file generation" || echo "No changes to commit"
        git push